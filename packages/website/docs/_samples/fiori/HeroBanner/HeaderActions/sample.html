<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sample</title>
</head>

<body style="background-color: var(--sapBackgroundColor)">
    <!-- playground-fold-end -->

        <ui5-hero-banner
            header-text="Hello, Emma"
            overline-text="Monday, May 26, 2026"
            layout="TwoThirds">

            <ui5-button slot="headerActions" icon="action-settings">Preferences</ui5-button>
            <ui5-button slot="headerActions" icon="bell">3 Notifications</ui5-button>

            <ui5-card>
                <ui5-card-header slot="header" title-text="My Projects" subtitle-text="Active"></ui5-card-header>
                <div style="padding: 0.75rem;">
                    <div style="display: flex; justify-content: space-between; padding: 0.25rem 0;">
                        <span>ERP Migration</span>
                        <ui5-tag design="Set2" color-scheme="8">On Track</ui5-tag>
                    </div>
                    <div style="display: flex; justify-content: space-between; padding: 0.25rem 0;">
                        <span>Cloud Integration</span>
                        <ui5-tag design="Set2" color-scheme="1">At Risk</ui5-tag>
                    </div>
                    <div style="display: flex; justify-content: space-between; padding: 0.25rem 0;">
                        <span>Data Analytics Platform</span>
                        <ui5-tag design="Set2" color-scheme="8">On Track</ui5-tag>
                    </div>
                </div>
            </ui5-card>

            <ui5-card slot="endContent">
                <ui5-card-header slot="header" title-text="Approvals Pending" subtitle-text="Requires action"></ui5-card-header>
                <div style="padding: 0.75rem; font-size: 1.5rem; font-weight: bold;">5</div>
            </ui5-card>
        </ui5-hero-banner>

    <!-- playground-fold -->
    <script type="module" src="main.js"></script>
</body>

</html>
<!-- playground-fold-end -->
