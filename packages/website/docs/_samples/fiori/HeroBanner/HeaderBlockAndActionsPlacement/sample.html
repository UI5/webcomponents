<!DOCTYPE html>
<html lang="en">

<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>Sample</title>
	<script src="https://sdk.openui5.org/resources/sap-ui-integration.js" id="sap-ui-bootstrap"
		data-sap-ui-theme="sap_horizon">
		</script>
</head>

<body style="background-color: var(--sapBackgroundColor)">
	<!-- playground-fold-end -->

	<ui5-hero-banner header-text="Good Morning, Anna" overline-text="Monday, May 26, 2026" columns-ratio="Equal"
		actions-placement="BottomStart" header-block-placement="Bottom">

		<div slot="actions" style="display: flex; gap: 0.5rem; flex-wrap: wrap;">
			<ui5-button icon="create" design="Default">New Request</ui5-button>
			<ui5-button icon="document" design="Default">Create Report</ui5-button>
			<ui5-button icon="email" design="Default">Send Message</ui5-button>
		</div>

		<ui5-carousel background-design="Transparent" page-indicator-border-design="None" page-indicator-background-design="Transparent" slot="endContent"
			style="width: 100%;">
			<ui-integration-card style="width: 280px;" manifest='{
                    "sap.app": { "id": "ticketsCard", "type": "card" },
                    "sap.card": {
                        "type": "List",
                        "header": {
                            "icon": { "src": "sap-icon://customer-order-entry" },
                            "title": "Open Tickets",
                            "subtitle": "Support queue",
                            "status": { "text": "42 open" }
                        }
                    }
                }'></ui-integration-card>
			<ui-integration-card style="width: 280px;" manifest='{
                    "sap.app": { "id": "revenueCard", "type": "card" },
                    "sap.card": {
                        "type": "List",
                        "header": {
                            "icon": { "src": "sap-icon://money-bills" },
                            "title": "Revenue YTD",
                            "subtitle": "Q2 2026",
                            "status": { "text": "€4.2M" }
                        }
                    }
                }'></ui-integration-card>
			<ui-integration-card style="width: 280px;" manifest='{
                    "sap.app": { "id": "tasksCard", "type": "card" },
                    "sap.card": {
                        "type": "List",
                        "header": {
                            "icon": { "src": "sap-icon://task" },
                            "title": "Pending Approvals",
                            "subtitle": "Needs attention",
                            "status": { "text": "7 total" }
                        }
                    }
                }'></ui-integration-card>
		</ui5-carousel>
	</ui5-hero-banner>

	<!-- playground-fold -->
	<script type="module" src="main.js"></script>
</body>

</html>
<!-- playground-fold-end -->
