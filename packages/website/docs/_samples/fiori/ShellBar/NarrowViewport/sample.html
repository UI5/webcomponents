<!-- playground-fold -->
<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sample</title>
    <style>
        .viewport-label {
            font-size: 0.75rem;
            color: var(--sapNeutralTextColor);
            margin: 0 0 4px 0;
            font-family: var(--sapFontFamily);
        }
        .viewport-frame {
            border: 1px solid var(--sapList_BorderColor, #ccc);
            margin-bottom: 24px;
            box-sizing: content-box;
        }
        .frame-320 { width: 320px; }
        .frame-360 { width: 360px; }
    </style>
</head>

<body style="background-color: var(--sapBackgroundColor)">
    <!-- playground-fold-end -->

        <p class="viewport-label">320px viewport — content button is dropped</p>
        <div class="viewport-frame frame-320">
            <ui5-shellbar primary-title="Application Title" secondary-title="Secondary">
                <ui5-shellbar-branding slot="branding">
                    <img slot="logo" src="../assets/images/sap-logo-svg.svg" />
                </ui5-shellbar-branding>

                <ui5-button slot="startButton" icon="menu2" tooltip="Menu"></ui5-button>
                <ui5-button slot="startButton" icon="nav-back" tooltip="Back"></ui5-button>

                <ui5-button slot="content" icon="slim-arrow-down" tooltip="Application Title"></ui5-button>

                <ui5-avatar slot="profile" initials="JM"></ui5-avatar>

                <ui5-shellbar-item icon="activities" text="Activities"></ui5-shellbar-item>
                <ui5-shellbar-item icon="bell" text="Notifications"></ui5-shellbar-item>
                <ui5-shellbar-item icon="action-settings" text="Settings"></ui5-shellbar-item>
                <ui5-shellbar-item icon="sys-help" text="Help"></ui5-shellbar-item>
                <ui5-shellbar-item icon="discussion" text="Discussion"></ui5-shellbar-item>
            </ui5-shellbar>
        </div>

        <p class="viewport-label">360px viewport — content button visible</p>
        <div class="viewport-frame frame-360">
            <ui5-shellbar primary-title="Application Title" secondary-title="Secondary">
                <ui5-shellbar-branding slot="branding">
                    <img slot="logo" src="../assets/images/sap-logo-svg.svg" />
                </ui5-shellbar-branding>

                <ui5-button slot="startButton" icon="menu2" tooltip="Menu"></ui5-button>
                <ui5-button slot="startButton" icon="nav-back" tooltip="Back"></ui5-button>

                <ui5-button slot="content" icon="slim-arrow-down" tooltip="Application Title"></ui5-button>

                <ui5-avatar slot="profile" initials="JM"></ui5-avatar>

                <ui5-shellbar-item icon="activities" text="Activities"></ui5-shellbar-item>
                <ui5-shellbar-item icon="bell" text="Notifications"></ui5-shellbar-item>
                <ui5-shellbar-item icon="action-settings" text="Settings"></ui5-shellbar-item>
                <ui5-shellbar-item icon="sys-help" text="Help"></ui5-shellbar-item>
                <ui5-shellbar-item icon="discussion" text="Discussion"></ui5-shellbar-item>
            </ui5-shellbar>
        </div>

    <!-- playground-fold -->
    <script type="module" src="main.js"></script>
</body>

</html>
<!-- playground-fold-end -->
