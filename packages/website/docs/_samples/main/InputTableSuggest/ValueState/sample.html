<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sample</title>
</head>

<body style="background-color: var(--sapBackgroundColor); height: 300px;">
<!-- playground-fold-end -->

    <div style="display: flex; flex-direction: column; gap: 1rem;">
        <ui5-input-table-suggest placeholder="Error state..." value-state="Negative" show-suggestions>
            <div slot="valueStateMessage">Product ID is invalid. Please enter a valid ID.</div>
            <ui5-table-header-cell slot="suggestionColumns" width="150px">Product</ui5-table-header-cell>
            <ui5-table-header-cell slot="suggestionColumns" min-width="100px">Price</ui5-table-header-cell>
            <ui5-table-row slot="suggestionRows">
                <ui5-table-cell>PRD-001</ui5-table-cell>
                <ui5-table-cell>$99</ui5-table-cell>
            </ui5-table-row>
        </ui5-input-table-suggest>

        <ui5-input-table-suggest placeholder="Warning state..." value-state="Critical" show-suggestions>
            <div slot="valueStateMessage">Stock is running low. Consider reordering soon.</div>
            <ui5-table-header-cell slot="suggestionColumns" width="150px">Product</ui5-table-header-cell>
            <ui5-table-header-cell slot="suggestionColumns" min-width="100px">Stock</ui5-table-header-cell>
            <ui5-table-row slot="suggestionRows">
                <ui5-table-cell>Widget X</ui5-table-cell>
                <ui5-table-cell>5 left</ui5-table-cell>
            </ui5-table-row>
        </ui5-input-table-suggest>

        <ui5-input-table-suggest placeholder="Information state..." value-state="Information" show-suggestions>
            <div slot="valueStateMessage">Tip: You can use wildcards (*) for broader search.</div>
            <ui5-table-header-cell slot="suggestionColumns" width="150px">Search</ui5-table-header-cell>
            <ui5-table-header-cell slot="suggestionColumns" min-width="100px">Results</ui5-table-header-cell>
            <ui5-table-row slot="suggestionRows">
                <ui5-table-cell>Widget*</ui5-table-cell>
                <ui5-table-cell>25 matches</ui5-table-cell>
            </ui5-table-row>
        </ui5-input-table-suggest>
    </div>

<!-- playground-fold -->
    <script type="module" src="main.js"></script>
</body>

</html>
<!-- playground-fold-end -->
