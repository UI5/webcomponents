<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sample</title>
</head>

<body style="background-color: var(--sapBackgroundColor); height: 450px;">
    <!-- playground-fold-end -->

    <ui5-button id="dialogOpener">Open Dialog with Fullscreen Button</ui5-button>

    <ui5-dialog id="dialog" header-text="Fullscreen Dialog" show-fullscreen-button draggable resizable>
        <div>This dialog has a fullscreen toggle button in the header.</div>
        <div>Click the fullscreen button or press Shift+Ctrl+F to toggle fullscreen mode.</div>
        <div>You can also double-click the header to toggle.</div>
        <ui5-toolbar slot="footer">
            <ui5-toolbar-button class="dialogCloser" design="Emphasized" text="OK"></ui5-toolbar-button>
        </ui5-toolbar>
    </ui5-dialog>
    <!-- playground-fold -->
    <script type="module" src="main.js"></script>
</body>

</html>
<!-- playground-fold-end -->
