name: Dev Close Notice

# Posts a comment on PRs targeting `main` during the "dev close" period
# (the week leading up to a release) reminding contributors not to merge
# until the release ships.
#
# Detection: build the custom-elements-internal.json manifest on PR base
# AND PR head, diff for public-API additions/removals/changes (filtered
# to `_ui5privacy: "public"` / `privacy: "public"`). Logic lives in
# `.github/scripts/dev-close/diff-cem.mjs` and `format-diff.mjs`.
#
# Trial run: only the next dev-close window is configured below.
#
# Dates are interpreted in UTC. devCloseStart is inclusive; releaseDate is
# exclusive (i.e. on releaseDate itself the workflow stops commenting).

on:
  pull_request:
    types: [opened, reopened, ready_for_review, synchronize]
    branches:
      - main

  # Manual trigger for testing.
  workflow_dispatch:

permissions:
  contents: read
  pull-requests: write

jobs:
  dev-close-notice:
    # Only run when src files actually changed — no point building CEM otherwise.
    runs-on: ubuntu-latest
    steps:
      - name: Check whether we are in a dev-close window
        id: window
        uses: actions/github-script@v7
        with:
          script: |
            // ----- Configuration -------------------------------------------------
            // Add new entries here when the release schedule is known.
            // devCloseStart: first day PRs should NOT be merged (inclusive, UTC)
            // releaseDate:   day the release ships (exclusive — period ends here)
            const DEV_CLOSE_PERIODS = [
              { release: "next", devCloseStart: "2026-06-29", releaseDate: "2026-07-06" },
            ];

            const today = new Date();
            today.setUTCHours(0, 0, 0, 0);

            const active = DEV_CLOSE_PERIODS.find(p => {
              const start = new Date(`${p.devCloseStart}T00:00:00Z`);
              const end = new Date(`${p.releaseDate}T00:00:00Z`);
              return today >= start && today < end;
            });

            if (!active) {
              core.info(`Today (${today.toISOString().slice(0, 10)}) is not in a dev-close window — exiting.`);
              core.setOutput("active", "false");
              return;
            }

            core.info(`In dev-close window for release "${active.release}" (${active.devCloseStart} → ${active.releaseDate}).`);
            core.setOutput("active", "true");
            core.setOutput("release", active.release);
            core.setOutput("releaseDate", active.releaseDate);

      - name: Checkout PR head
        if: steps.window.outputs.active == 'true'
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha }}
          fetch-depth: 0
          path: head

      - name: Detect changed src paths
        id: changed
        if: steps.window.outputs.active == 'true'
        working-directory: head
        run: |
          base_sha="${{ github.event.pull_request.base.sha }}"
          if git diff --name-only "$base_sha" HEAD -- 'packages/*/src/**' | grep -q .; then
            echo "src_changed=true" >> "$GITHUB_OUTPUT"
          else
            echo "src_changed=false" >> "$GITHUB_OUTPUT"
            echo "No src changes — nothing to diff."
          fi

      - name: Setup Node
        if: steps.window.outputs.active == 'true' && steps.changed.outputs.src_changed == 'true'
        uses: actions/setup-node@v4.1.0
        with:
          node-version: 22
          cache: 'yarn'
          cache-dependency-path: head/yarn.lock

      - name: Build CEM on PR head
        id: head_build
        if: steps.window.outputs.active == 'true' && steps.changed.outputs.src_changed == 'true'
        # Soft-fail: a failure here just means we have no head manifests, the
        # diff step will see that and exit without commenting.
        continue-on-error: true
        working-directory: head
        run: |
          set -e
          yarn install --immutable
          yarn generate
          mkdir -p ../cem-head
          for f in packages/*/dist/custom-elements-internal.json; do
            [ -f "$f" ] || continue
            pkg=$(basename "$(dirname "$(dirname "$f")")")
            cp "$f" "../cem-head/${pkg}.json"
          done
          echo "Captured $(ls ../cem-head | wc -l) head manifests."

      - name: Checkout PR base
        if: steps.window.outputs.active == 'true' && steps.changed.outputs.src_changed == 'true' && steps.head_build.outcome == 'success'
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.base.sha }}
          fetch-depth: 1
          path: base

      - name: Build CEM on PR base
        id: base_build
        if: steps.window.outputs.active == 'true' && steps.changed.outputs.src_changed == 'true' && steps.head_build.outcome == 'success'
        continue-on-error: true
        working-directory: base
        run: |
          set -e
          yarn install --immutable
          yarn generate
          mkdir -p ../cem-base
          for f in packages/*/dist/custom-elements-internal.json; do
            [ -f "$f" ] || continue
            pkg=$(basename "$(dirname "$(dirname "$f")")")
            cp "$f" "../cem-base/${pkg}.json"
          done
          echo "Captured $(ls ../cem-base | wc -l) base manifests."

      - name: Diff manifests
        id: diff
        if: steps.window.outputs.active == 'true' && steps.changed.outputs.src_changed == 'true' && steps.head_build.outcome == 'success' && steps.base_build.outcome == 'success'
        run: |
          diff_json=$(node head/.github/scripts/dev-close/diff-cem.mjs cem-base cem-head)
          has_changes=$(echo "$diff_json" | node -e "let s=''; process.stdin.on('data',d=>s+=d).on('end',()=>{const j=JSON.parse(s);process.stdout.write(j.hasChanges?'true':'false')})")
          if [ "$has_changes" = "true" ]; then
            md=$(echo "$diff_json" | node head/.github/scripts/dev-close/format-diff.mjs)
            {
              echo 'md<<DEV_CLOSE_EOF'
              echo "$md"
              echo 'DEV_CLOSE_EOF'
            } >> "$GITHUB_OUTPUT"
            echo "has_changes=true" >> "$GITHUB_OUTPUT"
          else
            echo "has_changes=false" >> "$GITHUB_OUTPUT"
            echo "No public-API changes detected."
          fi

      - name: Comment on PR
        if: steps.window.outputs.active == 'true' && steps.diff.outputs.has_changes == 'true'
        uses: actions/github-script@v7
        env:
          DIFF_MD: ${{ steps.diff.outputs.md }}
          RELEASE: ${{ steps.window.outputs.release }}
          RELEASE_DATE: ${{ steps.window.outputs.releaseDate }}
        with:
          script: |
            const MARKER = "<!-- dev-close-notice -->";
            const prNumber = context.payload.pull_request.number;

            // Skip drafts — they aren't merge candidates yet.
            if (context.payload.pull_request.draft) {
              core.info(`PR #${prNumber}: draft, skipping.`);
              return;
            }

            // Idempotent: don't post again if the marker is already there.
            const comments = await github.paginate(github.rest.issues.listComments, {
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: prNumber,
              per_page: 100,
            });
            if (comments.some(c => c.body && c.body.includes(MARKER))) {
              core.info(`PR #${prNumber}: marker already present, skipping.`);
              return;
            }

            const body = [
              MARKER,
              `### ⏸️ Dev close in effect`,
              ``,
              `This repository is currently in **dev close** ahead of release \`${process.env.RELEASE}\` (scheduled **${process.env.RELEASE_DATE}**, UTC).`,
              ``,
              `This PR introduces **public-API changes** detected by diffing the Custom Elements Manifest:`,
              ``,
              process.env.DIFF_MD,
              ``,
              `Please **do not merge it into \`main\`** until the release ships — public API changes should land in the next dev cycle.`,
              ``,
              `_Posted automatically by the [Dev Close Notice](../blob/main/.github/workflows/dev-close-notice.yaml) workflow._`,
            ].join("\n");

            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: prNumber,
              body,
            });
            core.info(`PR #${prNumber}: posted dev-close notice.`);
